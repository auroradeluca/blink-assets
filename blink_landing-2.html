<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blink Personal Consulting</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue:   #2563EB;
  --text:   #0F172A;
  --mid:    #475569;
  --light:  #94A3B8;
  --border: #E2E8F0;
}

html, body {
  height: 100%;
  font-family: "Inter", sans-serif;
  -webkit-font-smoothing: antialiased;
  background: #fff;
  overflow: hidden;
}

.landing {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
  position: relative;
  background: #fff;
}

/* Dot grid */
.landing::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, #CBD5E1 1px, transparent 1px);
  background-size: 28px 28px;
  opacity: 0.5;
  pointer-events: none;
}

/* Blue glow */
.glow {
  position: absolute;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(37,99,235,0.06) 0%, transparent 70%);
  pointer-events: none;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Logo */
.logo-wrap {
  width: clamp(260px, 52vw, 520px);
  margin-bottom: 40px;
  animation: fadeUp 0.65s ease both;
}

/* Divider */
.divider {
  width: 1px;
  height: 36px;
  background: linear-gradient(to bottom, transparent, var(--border), transparent);
  margin-bottom: 28px;
  animation: fadeUp 0.65s 0.15s ease both;
}

/* Tagline */
.tagline {
  font-size: clamp(0.82rem, 1.4vw, 0.95rem);
  color: var(--mid);
  font-weight: 400;
  margin-bottom: 36px;
  animation: fadeUp 0.65s 0.22s ease both;
  text-align: center;
  max-width: 380px;
  line-height: 1.65;
}

/* Buttons */
.lang-buttons {
  display: flex;
  gap: 10px;
  animation: fadeUp 0.65s 0.32s ease both;
}

.lang-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 11px 28px;
  border-radius: 6px;
  font-size: 0.875rem;
  font-weight: 500;
  font-family: "Inter", sans-serif;
  text-decoration: none;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: #fff;
  color: var(--text);
  transition: all 0.2s ease;
}

.lang-btn:hover {
  border-color: var(--blue);
  color: var(--blue);
  transform: translateY(-2px);
  box-shadow: 0 4px 14px rgba(37,99,235,0.1);
}

.lang-btn.primary {
  background: var(--blue);
  border-color: var(--blue);
  color: #fff;
}
.lang-btn.primary:hover {
  background: #1D4ED8;
  border-color: #1D4ED8;
  box-shadow: 0 4px 14px rgba(37,99,235,0.28);
}

.bottom-note {
  position: absolute;
  bottom: 24px;
  font-size: 0.7rem;
  color: var(--light);
  letter-spacing: 0.04em;
  animation: fadeUp 0.65s 0.42s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 480px) {
  .lang-buttons { flex-direction: column; width: 100%; max-width: 200px; }
  .lang-btn { justify-content: center; }
}
</style>
</head>
